kind = "web"
previewPath = "/"
title = "Sydney Removalists"
version = "1.0.0"
id = "artifacts/removalist-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22614

[services.development]
run = "pnpm --filter @workspace/removalist-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/removalist-app", "run", "build" ]
publicDir = "artifacts/removalist-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22614"
BASE_PATH = "/"
